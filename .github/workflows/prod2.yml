name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  # -------------------------
  # 1. Lint + Test Job
  # -------------------------
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flake8
        run: flake8 .

      - name: Run tests
        run: pytest

  # -------------------------
  # 2. Build & Push Job
  # -------------------------
  build:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/internal-utility-service:latest .

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/internal-utility-service:latest

  # -------------------------
  # 3. Deploy Job
  # -------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY_PAIR }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/internal-utility-service:latest
            docker stop app || true
            docker rm app || true
            docker run -d --restart always -p 5000:5000 --name app ${{ secrets.DOCKER_USERNAME }}/internal-utility-service:latest