name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  # -------------------------
  # 1. Lint + Test Job
  # -------------------------
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flake8
        run: flake8 .

      - name: Run tests
        run: pytest

  # -------------------------
  # 2. Build & Push Job
  # -------------------------
  build:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/internal-utility-service:latest .

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/internal-utility-service:latest

  # -------------------------
  # 3. Deploy Job (BLUE-GREEN)
  # -------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to EC2 (Blue-Green)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY_PAIR }}
          script: |
            IMAGE=${{ secrets.DOCKER_USERNAME }}/internal-utility-service:latest

            echo "Pulling latest image..."
            docker pull $IMAGE

            echo "Checking current running container..."
            if docker ps --format '{{.Names}}' | grep -q app; then
              NEW_CONTAINER=app_green
              OLD_CONTAINER=app
              NEW_PORT=5001
            else
              NEW_CONTAINER=app
              OLD_CONTAINER=app_green
              NEW_PORT=5000
            fi

            echo "Starting new container: $NEW_CONTAINER on port $NEW_PORT"
            docker run -d --restart always -p $NEW_PORT:5000 --name $NEW_CONTAINER $IMAGE

            echo "Waiting for container to boot..."
            sleep 10

            echo "Switching Nginx to new container..."
            sudo sed -i "s/localhost:[0-9]*/localhost:$NEW_PORT/" /etc/nginx/sites-available/default

            sudo nginx -t
            sudo systemctl reload nginx

            echo "Stopping old container..."
            docker stop $OLD_CONTAINER || true
            docker rm $OLD_CONTAINER || true

            echo "Deployment complete "